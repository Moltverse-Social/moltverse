# Database Migration Workflow
#
# Executes Prisma migrations against the production database.
# This workflow replaces the preDeployCommand that was removed due to a Railway
# serviceInstance override bug.
#
# Triggers:
#   - Manual dispatch (recommended for production)
#   - Push to main when migration files change
#
# Required Secrets:
#   - DATABASE_URL: Production PostgreSQL connection string
#
# Usage:
#   1. Go to Actions tab in GitHub
#   2. Select "Database Migration" workflow
#   3. Click "Run workflow"
#   4. Choose environment and confirm
#
# Security:
#   - Only runs on main branch
#   - Requires explicit confirmation for production
#   - Uses GitHub Secrets for credentials

name: Database Migration

on:
  # Manual trigger with environment selection
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      confirm:
        description: 'Type "MIGRATE" to confirm'
        required: true
        type: string

  # Automatic trigger on migration file changes
  push:
    branches:
      - main
    paths:
      - 'apps/server/prisma/migrations/**'
      - 'apps/server/prisma/schema.prisma'

# Ensure only one migration runs at a time
concurrency:
  group: database-migration
  cancel-in-progress: false

jobs:
  migrate:
    name: Run Database Migration
    runs-on: ubuntu-latest

    # Only run if manual dispatch is confirmed OR if triggered by push
    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'MIGRATE')

    steps:
      - name: Validate confirmation
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "MIGRATE" ]; then
            echo "::error::Confirmation failed. Please type 'MIGRATE' to confirm."
            exit 1
          fi
          echo "Confirmation received. Proceeding with migration to ${{ github.event.inputs.environment }}..."

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          # Cache disabled: package-lock.json not versioned (workspaces monorepo)

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        working-directory: apps/server
        run: npx prisma generate

      - name: Check migration status
        working-directory: apps/server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Checking current migration status..."
          npx prisma migrate status || true

      - name: Resolve failed migrations
        working-directory: apps/server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Resolving any failed migrations..."
          # Mark migrations as applied if the underlying changes already exist
          # These migrations were partially applied before the workflow was set up
          npx prisma migrate resolve --applied "20260210_add_agent_activity" 2>/dev/null || true
          npx prisma migrate resolve --applied "20260211_auth_security_improvements" 2>/dev/null || true
          npx prisma migrate resolve --applied "20260211_hash_api_keys" 2>/dev/null || true
          npx prisma migrate resolve --applied "20260211_photo_folder_description" 2>/dev/null || true
          npx prisma migrate resolve --applied "20260211_topic_pinned_locked" 2>/dev/null || true
          npx prisma migrate resolve --applied "20260213_email_verification_code" 2>/dev/null || true
          npx prisma migrate resolve --applied "20260217_add_agent_personality_fields" 2>/dev/null || true
          npx prisma migrate resolve --applied "20260217_add_community_karma_events" 2>/dev/null || true
          npx prisma migrate resolve --applied "20260217_add_live_pulse_events" 2>/dev/null || true
          npx prisma migrate resolve --applied "20260218_add_password_changed_at" 2>/dev/null || true
          npx prisma migrate resolve --applied "20260218_add_webhooks" 2>/dev/null || true
          npx prisma migrate resolve --applied "20260219_add_ads_system" 2>/dev/null || true
          npx prisma migrate resolve --applied "20260219_add_brand_email_verification" 2>/dev/null || true
          npx prisma migrate resolve --applied "20260219_add_payment_fields_to_campaign" 2>/dev/null || true
          echo "Migration resolution complete."

      - name: Run migrations
        working-directory: apps/server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Applying migrations to database..."
          npx prisma migrate deploy
          echo "Migrations completed successfully!"

      - name: Verify database connection
        working-directory: apps/server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Verifying database connection..."
          npx prisma db execute --stdin <<< "SELECT 1 as health_check;"
          echo "Database connection verified!"

      - name: Summary
        run: |
          echo "## Migration Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** ${{ github.event.inputs.environment || 'production (auto)' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** Success" >> $GITHUB_STEP_SUMMARY

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: migrate
    if: failure()

    steps:
      - name: Create failure summary
        run: |
          echo "## Migration Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Database migration failed. Please check the logs above." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Action required:** Review the error and fix before retrying." >> $GITHUB_STEP_SUMMARY
