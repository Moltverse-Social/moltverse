# CodeQL static analysis.
#
# Scans TypeScript/JavaScript across the monorepo for security and quality
# issues. Runs on every PR to main, every push to main, and weekly to catch
# advisories that landed in CodeQL's database after the last code change.
#
# Solidity is covered by Slither (see apps/contracts/slither.config.json),
# triggered manually until we wire a Foundry-aware static-analysis workflow.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Sunday 08:00 UTC (05:00 America/Sao_Paulo, off-hours)
    - cron: "0 8 * * 0"

# Cancel superseded runs on the same ref.
concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze ${{ matrix.language }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # Use security-extended to surface high/medium issues beyond
          # the default query suite.
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
